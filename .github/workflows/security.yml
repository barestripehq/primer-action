name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  security-events: write   # SARIF upload to GitHub Security tab
  pull-requests: write     # PR comment
  actions: read
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan dependencies
        id: primer
        uses: barestripehq/primer-action@v1
        with:
          file: package-lock.json

      - name: Summary
        run: |
          echo "findings-count=${{ steps.primer.outputs.findings-count }}"
          echo "blocking-count=${{ steps.primer.outputs.blocking-count }}"
          echo "sarif-path=${{ steps.primer.outputs.sarif-path }}"
